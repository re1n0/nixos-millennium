name: build all

on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["update-dependencies"]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: nixos-millennium
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true

      - name: Build all packages
        run: |
          set -eo pipefail
          SYSTEM="x86_64-linux"

          find_pkgs() {
            local attr="$1"
            nix eval ".#${attr}.\"$SYSTEM\"" --json --apply '
              let
                findPaths = prefix: set:
                  builtins.concatLists (builtins.map (name:
                    let
                      path = if prefix == "" then name else "${prefix}.${name}";
                      value = set.${name};
                    in
                    if builtins.isAttrs value && value ? type && value.type == "derivation" then
                      [ { pkg = path; src = "'${attr}'"; } ]
                    else if builtins.isAttrs value && !(value ? type) then
                      findPaths path value
                    else
                      []
                  ) (builtins.attrNames set));
              in
              findPaths ""' 2>/dev/null || echo "[]"
          }

          LEGACY_PKGS=$(find_pkgs "legacyPackages")
          PACKAGES=$(find_pkgs "packages")

          ALL_PKGS=$(jq -r --argjson a "$LEGACY_PKGS" --argjson b "$PACKAGES" \
            '($a + $b) | unique_by(.pkg) | .[] | "\(.src).\(.pkg)"' <<< "null")

          if [ -z "$ALL_PKGS" ]; then
            echo "No packages found."
            exit 0
          fi

          while IFS= read -r entry; do
            src="${entry%%.*}"            
            pkg="${entry#*.}"             
            full=".#${src}.\"${SYSTEM}\".${pkg}"
            echo "Building ${full}..."
            nix build --no-link "$full"
          done <<< "$ALL_PKGS"
        env:
          NIX_REMOTE: "daemon"
